<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* Add some basic styling for the card */
        .certification-card {
            border: 2px solid #0073e6;
            border-radius: 8px;
            padding: 20px;
            width: 300px;
            margin: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Style the AWS logo */
        .aws-logo {
            width: 100px;
            height: 100px;
        }

        /* Add some styles for the certification details */
        .certification-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .certification-date {
            font-size: 14px;
            color: #555;
        }

        /* Customize the button style */
        .view-certificate-button {
            background-color: #0073e6;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            text-decoration: none;
        }

        /* Style the button on hover */
        .view-certificate-button:hover {
            background-color: #005bbf;
        }
    </style>
</head>
<body>
    <div class="certification-card">
        <img src="aws_logo.png" alt="AWS Certified Logo" class="aws-logo">
        <div class="certification-title">AWS Certified Solutions Architect - Associate</div>
        <div class="certification-date">Certified on September 8, 2023</div>
        <a href="link-to-your-certificate.pdf" class="view-certificate-button">View Certificate</a>
    </div>
</body>
</html>
